<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест friends.getRecent</title>
    <style>
        body { font-family: system-ui; background: #ebedf0; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 24px; border-radius: 20px; max-width: 600px; width: 100%; }
        h2 { margin: 0 0 10px; }
        .input-group { margin-bottom: 15px; }
        textarea { width: 100%; padding: 10px; border-radius: 12px; border: 1px solid #ddd; font-size: 12px; height: 60px; }
        button { padding: 12px; border: none; border-radius: 12px; background: #4a76a8; color: white; font-weight: bold; width: 100%; cursor: pointer; }
        button:disabled { opacity: 0.6; }
        .friend { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #eee; }
        .friend img { width: 40px; height: 40px; border-radius: 50%; background: #ddd; }
        .friend .info { flex: 1; }
        .friend .name { font-weight: 600; }
        .friend .id { font-size: 12px; color: #888; }
        .log { background: #2c3e50; color: #ecf0f1; border-radius: 10px; padding: 10px; font-family: monospace; font-size: 12px; margin-top: 15px; max-height: 200px; overflow-y: auto; }
        .log div { padding: 2px 0; }
        .log .err { color: #e74c3c; }
        .log .ok { color: #2ecc71; }
        .log .info { color: #3498db; }
    </style>
</head>
<body>
<div class="card">
    <h2>🧪 Тест friends.getRecent</h2>
    <p>Сравните список с официальным приложением (недавно добавленные).</p>
    <div class="input-group">
        <label>Токен или ссылка</label>
        <textarea id="tokenInput" placeholder="Вставьте токен или ссылку..."></textarea>
    </div>
    <button id="checkBtn" onclick="checkRecent()">🔍 Проверить recent (10)</button>
    <div id="result" style="margin-top: 15px;"></div>
    <div id="log" class="log"></div>
</div>
<script>
    function log(msg, type = 'info') {
        const div = document.createElement('div');
        div.className = type;
        div.textContent = msg;
        document.getElementById('log').appendChild(div);
    }

    function getToken() {
        const raw = document.getElementById('tokenInput').value.trim();
        return raw.includes('access_token=') ? raw.split('access_token=')[1].split('&')[0] : raw;
    }

    function vkCall(method, params, token) {
        return new Promise((resolve) => {
            const cbName = 'vk_' + Math.random().toString(16).slice(2);
            window[cbName] = (data) => {
                delete window[cbName];
                document.body.removeChild(script);
                resolve(data);
            };
            const script = document.createElement('script');
            const query = new URLSearchParams({...params, access_token: token, v: '5.199', callback: cbName});
            script.src = `https://api.vk.com/method/${method}?${query}`;
            document.body.appendChild(script);
        });
    }

    async function checkRecent() {
        const token = getToken();
        if (token.length < 30) {
            alert('Введите корректный токен');
            return;
        }
        const btn = document.getElementById('checkBtn');
        btn.disabled = true;
        document.getElementById('log').innerHTML = '';
        document.getElementById('result').innerHTML = '';
        log('⏳ Запрос friends.getRecent (count=10)...', 'info');

        try {
            // 1. Получить recent
            const recentRes = await vkCall('friends.getRecent', { count: 10 }, token);
            if (recentRes.error) {
                log('❌ Ошибка: ' + recentRes.error.error_msg, 'err');
                btn.disabled = false;
                return;
            }
            const recentIds = recentRes.response.items || [];
            log(`✅ Получено ${recentIds.length} ID: ${recentIds.join(', ')}`, 'ok');

            if (recentIds.length === 0) {
                log('⚠️ Список пуст', 'info');
                btn.disabled = false;
                return;
            }

            // 2. Получить данные пользователей
            const usersRes = await vkCall('users.get', {
                user_ids: recentIds.join(','),
                fields: 'photo_50,first_name,last_name'
            }, token);
            if (usersRes.error) {
                log('❌ Ошибка получения данных: ' + usersRes.error.error_msg, 'err');
                btn.disabled = false;
                return;
            }
            const users = usersRes.response || [];

            // 3. Отобразить
            const container = document.getElementById('result');
            container.innerHTML = '<h3>📋 Недавно добавленные (10):</h3>';
            users.forEach((user, index) => {
                const div = document.createElement('div');
                div.className = 'friend';
                const avatar = user.photo_50 ? `<img src="${user.photo_50}">` : '<div style="width:40px;height:40px;border-radius:50%;background:#ddd;"></div>';
                div.innerHTML = `
                    ${avatar}
                    <div class="info">
                        <div class="name">${user.first_name} ${user.last_name}</div>
                        <div class="id">ID: ${user.id}</div>
                    </div>
                    <div style="font-size:12px;color:#888;">#${index+1}</div>
                `;
                container.appendChild(div);
            });

            log('✅ Готово. Сравните с официальным списком "Недавно добавленные".', 'ok');

        } catch (e) {
            log('❌ Ошибка: ' + e.message, 'err');
        }
        btn.disabled = false;
    }
</script>
</body>
</html>
